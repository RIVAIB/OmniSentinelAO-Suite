# docker-compose.yml — OmniSentinel local services stack
# Run: docker-compose --env-file .env.docker up -d
# Requires: Docker Desktop installed, .env.docker file filled in

version: "3.9"

services:

  # ── mem0 Memory Server ────────────────────────────────────────────────────
  mem0:
    build: ./services/mem0
    container_name: omni_mem0
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mem0
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mem0pass}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-mem0graph}
      HISTORY_DB_PATH: /app/history/history.db
    volumes:
      - mem0_history:/app/history
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Neo4j Graph Database ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: omni_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (web UI)
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-mem0graph}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-mem0graph}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omni_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"   # 5433 on host to avoid conflict with local Postgres
    environment:
      POSTGRES_DB: mem0
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mem0pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mem0_history:
  neo4j_data:
  postgres_data:
